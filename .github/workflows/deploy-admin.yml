name: Deploy Admin Worker

on:
  push:
    branches: [main]
    paths:
      - 'admin-worker/**'
      - '.github/workflows/deploy-admin.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Admin Worker to Cloudflare Workers

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN_DUICHAI }}
          workingDirectory: admin-worker
          command: deploy
